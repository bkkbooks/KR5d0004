front:
  text: 太上洞玄靈寳天關經大道妙用也有太易未見氣也太初氣之始也太始形之始也太素質之始也且氣形質三具而未相離散曰混沌是萬物未分判也輕清爲天重濁爲地故造天地章云老君者乃天地之根本萬物莫不由之而生成也故立乎不疾之途遊於無待之場御空洞以昇降乘陰陽以陶埏抱無名之大朴乃善貸而成焉故於九萬九千九百九十九億萬氣之初復列玄元始而生天地焉號無名之君演自然之道以化天地經大劫一交天地崩淪又積氣御運重立乾坤號曰無上玄老開導兆人經大劫之周天地復壞又造化二儀號太上老君秉持仙籙以度十方至一劫運終天地復淪又託生玄妙號高上老君而混成天地焉分别元氣清者爲天濁者爲地太陽之精爲日太陰之精爲月復分日月之精爲星辰置二十人宿布二十四氣建人節四時五行立五星立五嶽分五帝主之日月星各立宫室主理其中以春夏秋冬輔二十四氣復立三百六十名山七十二福地以鎮地理天地之氣交然後人及禽獸草木蝖飛蠕動森然皆生乃置立三皇五帝胤冑百姓更相産化天地相去四萬八千里東西南北相去萬萬九千里日月各徑三千里周圓各九千里崑崙山爲天地之齊北辰玄君其上北斗一星面百里相去九萬里如是置立凡有九天九地焉九天者從下第一波利天第二迦夷天第三梵寳天第四化應天第五不驕天第六寂然天第七須延天第八禪善天第九鬱單天九地者自上第一色潤地第二潤色地第三色澤地第四潤澤地第五金粟澤地第六金剛澤地第七水澤地第八風澤地第九洞泉綱維地此亦名九壘也然天位乃多今略舉三十六名分爲三界四天三清境域也從下第一欲界六天六天者太皇天太明天清眀天玄胎天元明天七曜天是也第二色界十八天者虚無天太極天赤明天恭華天曜明天竺落天虚明天觀明天恭慶天太焕天元載天太安天顯定天始黄天太黄天無思天上揲天無極天是也第三無色界四天者霄度天元洞天妙成天禁上天凡二十八天名爲三界也次上四人天有四者常融天玉隆天梵度天賈弈天此四天名爲種民天也合前凡三十二天並在三清之下矣次上三天號曰三清者第一大赤天曰太清境第二禹餘天曰上清境第三清微天曰玉清境最上一天號曰無上大羅高蓋天謂包羅諸天極高無上故也通前凡三十六天各立一帝地亦有三十六名各置一皇是爲三十六天帝三十六土皇也天地之外其狀如雞子又如車輪元氣繞之如日之暈黄精之所散也如是天地各有五億五寓五千五百五十五重也其中立天文地理土水火風陰陽之所生育皆從我始故二儀得之以分判三景得之以光明四氣得之以調和五行得之以相生江海得之以深澄山谷得之以虚盈道士得之以神仙王侯得之以太平品物得之以滋興神祇得之以致靈幽魂得之以開度枯骸得之以發榮寔上善之廣洽咸享自然之福也是知太上老君乃爲元氣之父母爲天地之本根爲陰陽之祖首爲萬神之帝君爲先王之柄蔕爲萬物之魄魂陶冶虚無造化應因衿帶人極載地懸天遊馳日月運走星辰呼吸六甲御制乾坤改易四時推移寒温驅使風雨鼓奮雷雲分别青黄歷數虚盈君臣父子禮義備焉論者以爲欲界之人有陰陽色欲更相産育色界人言有色而不交人皆化生無色界人謂性識微妙無復色想便止種人者次仙也謂壽有億萬身能飛行也雖漸階長壽猶未斷生死壽盡下生各隨業厚薄若能修習增進則昇入三清道境永免輪迴矣其中立三元宫置三官九府百二十曹列考官吏各書人生死罪福毫分無失庶向方之子其勉之焉子可歸命於十方天尊而延道氣東方玉寳皇上天尊見曲直之形儀衣甲乙之冠履拽龍虎之杖主寅卯之民子可歸之南方玄眞萬福天尊見炎上之形儀衣丙丁之冠履秉朱雀之笏主巳午之民子可歸之西方太妙至極天尊見從革之形儀衣庚辛之冠覆揮雪霜之刃主申酉之民子可歸之北方玄上玉晨天尊見潤下之形儀衣壬癸之冠履秉玄武之簡主亥子之民子可歸之東北方度仙上聖天尊見木水之形儀衣青黑之冠履仗鬼門之劎主艮極之民子可歸之東南方好生度命天尊見木火之形儀衣青赤之冠履掌風門之印主巽極之民子可歸之西南方太靈虚皇天尊見金火之形儀衣白赤之冠履掌地户之簿主坤極之民子可歸之西北方无量太華天尊見金水之形儀衣白黑之冠履掌天門之鏡主乾極之民子可歸之上方玉虚明皇天尊見輕清之形儀衣蒼穹之冠履運春夏秋冬之動植主君臣父子之枯榮子可歸之下方眞皇洞神天尊見重濁之形儀衣戊己之冠履施東南西北之願主辰戌丑未之民子可歸之凡三十六天天各立一帝三十六地地各置一皇其天帝地皇各有形儀冠履所表所主具列仙班圖籍即七十二天帝地皇俱尊十方天尊而統三界仙凡脩短禍福增减而不歸命於十方天尊而歸何所乎是以五嶽各圖形儀欲世民歸命矣頌曰三清降靈八極歸命六宫無塵十天景行朝眞誦此普禮十方天尊而求長生子宜歸之太上洞玄靈寳天關經終
